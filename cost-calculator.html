<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Себестоимость и точка безубыточности — общепит</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --espresso:#241609;
    --espresso-2:#3a2413;
    --paper:#FBF6EC;
    --paper-2:#F2EAD8;
    --gold:#C99A3D;
    --gold-2:#E8B84B;
    --ink:#2B1B12;
    --ink-soft:#6B5A48;
    --green:#3E7C59;
    --red:#B6462F;
    --line:#DCCFAE;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--espresso);
    background-image: radial-gradient(circle at 15% 10%, #3a2413 0%, #241609 55%);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  ::selection{background:var(--gold);color:var(--espresso);}

  .app{max-width:1180px;margin:0 auto;padding:28px 18px 80px;}

  /* HEADER */
  header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:22px;border-bottom:1px solid rgba(232,184,75,.25);padding-bottom:18px;}
  .brand-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-2);margin:0 0 6px;}
  h1.brand{font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(26px,4vw,38px);letter-spacing:.01em;margin:0;color:var(--paper);text-transform:uppercase;}
  .brand small{display:block;font-family:'Inter',sans-serif;font-weight:400;text-transform:none;font-size:14px;color:var(--ink-soft);color:#C9BBA0;margin-top:6px;letter-spacing:0;}
  .mode-switch{display:flex;gap:8px;font-family:'JetBrains Mono',monospace;font-size:12px;}
  .mode-switch button{background:transparent;border:1px solid rgba(232,184,75,.4);color:#C9BBA0;padding:8px 12px;border-radius:3px;cursor:pointer;letter-spacing:.05em;}

  /* TABS */
  .tabs{display:flex;gap:2px;margin-bottom:22px;flex-wrap:wrap;}
  .tab{font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:14px;letter-spacing:.04em;padding:12px 18px;background:rgba(255,255,255,.03);border:1px solid rgba(232,184,75,.18);border-bottom:none;color:#C9BBA0;cursor:pointer;}

  /* LAYOUT */
  .layout{display:grid;grid-template-columns:1fr 320px;gap:22px;align-items:start;}
  @media (max-width:900px){.layout{grid-template-columns:1fr;}}

  .panel{background:var(--paper);color:var(--ink);border-radius:2px;padding:26px;}
  .panel h2{font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:20px;letter-spacing:.03em;margin:0 0 4px;color:var(--espresso);}
  .panel .sub{font-size:13px;color:var(--ink-soft);margin:0 0 20px;}

  section.hidden{display:none;}

  /* FORM ELEMENTS */
  label.field-label{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin-bottom:5px;}
  input[type=text],input[type=number],input[type=tel],select{
    width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:2px;background:#fff;
    font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--ink);
  }
  input[type=text]{font-family:'Inter',sans-serif;}
  input:focus,select:focus{outline:2px solid var(--gold);outline-offset:1px;}
  .row{display:grid;gap:10px;margin-bottom:12px;}
  .row.r2{grid-template-columns:1fr 1fr;}
  .row.r3{grid-template-columns:2fr 1fr 1fr;}
  .row.r5{grid-template-columns:2fr 1fr 1fr 1fr auto;}
  @media (max-width:640px){.row.r5,.row.r3{grid-template-columns:1fr;}}

  .btn{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.04em;font-size:13px;font-weight:600;padding:11px 18px;border-radius:2px;border:none;cursor:pointer;}
  .btn-primary{background:var(--espresso);color:var(--gold-2);}
  .btn-primary:hover{background:var(--ink);}
  .btn-ghost{background:transparent;border:1px solid var(--ink-soft);color:var(--ink-soft);}

  .btn-gold{background:var(--gold);color:var(--espresso);}
  .btn-sm{padding:7px 10px;font-size:11px;}
  .btn:disabled{opacity:.55;cursor:default;}

  .dish-card{border:1px solid var(--line);border-radius:2px;padding:16px 16px 12px;margin-bottom:14px;background:#fff;}
  .dish-card-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;}
  .dish-card-head input[type=text]{font-family:'Oswald',sans-serif;font-size:16px;text-transform:uppercase;border:none;border-bottom:1px dashed var(--line);border-radius:0;padding:4px 0;flex:1;min-width:0;}
  .dish-card-head{flex-wrap:wrap;}
  .ing-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center;}

  .modifier-tag{font-size:10px;background:var(--gold);color:var(--espresso);padding:2px 6px;border-radius:2px;text-transform:uppercase;font-weight:700;letter-spacing:.04em;}
  .dish-stats{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-family:'JetBrains Mono',monospace;font-size:12px;}
  .dish-stats b{display:block;font-size:16px;color:var(--espresso);}
  .fc-good{color:var(--green);}
  .fc-bad{color:var(--red);}

  .exp-group{margin-bottom:22px;}
  .exp-group h3{font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:13px;letter-spacing:.05em;color:var(--ink-soft);margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line);}
  .exp-row{display:grid;grid-template-columns:1fr 130px;gap:10px;align-items:center;margin-bottom:8px;}
  .exp-row span{font-size:13px;}

  /* RECEIPT TAPE */

    background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,.025) 28px);
  }
  .receipt-title{text-align:center;font-family:'Oswald',sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;}
  .receipt-sub{text-align:center;font-size:10px;color:var(--ink-soft);margin-bottom:14px;}
  .receipt hr{border:none;border-top:1px dashed var(--ink-soft);margin:10px 0;}
  .receipt-line{display:flex;justify-content:space-between;gap:8px;padding:2px 0;}
  .receipt-line.total{font-weight:700;font-size:14px;margin-top:6px;}
  .receipt-line .l{color:var(--ink-soft);}

    linear-gradient(-45deg, var(--espresso) 5px, transparent 0),
    linear-gradient(45deg, var(--espresso) 5px, transparent 0);
    background-repeat:repeat-x;background-size:12px 12px;background-position:left bottom;margin-top:-22px;}

  .result-big{text-align:center;padding:26px 10px;}
  .result-big .num{font-family:'Oswald',sans-serif;font-size:44px;color:var(--espresso);font-weight:700;line-height:1;}
  .result-big .cap{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-top:6px;}

  .send-box{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:18px;}
  .send-box a.btn{text-decoration:none;display:inline-block;}

  .badge-id{display:inline-block;font-family:'JetBrains Mono',monospace;background:var(--espresso);color:var(--gold-2);padding:6px 12px;border-radius:2px;font-size:13px;letter-spacing:.05em;margin-top:10px;}

  footer.app-footer{text-align:center;margin-top:40px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#8a7a63;}
  footer.app-footer button{background:none;border:none;color:#8a7a63;text-decoration:underline;cursor:pointer;font-family:inherit;font-size:11px;}

  .lookup-result{margin-top:16px;border-top:1px solid var(--line);padding-top:16px;}
  .warn-box{background:#FCF1E9;border:1px solid #E8B84B;color:#6B4A17;padding:12px 14px;border-radius:2px;font-size:12.5px;margin-bottom:16px;}
  .empty-note{font-size:13px;color:var(--ink-soft);font-style:italic;padding:10px 0;}

  /* ===== ПЕЧАТНАЯ ВЕРСИЯ ОТЧЁТА (для PDF) =====
     ВАЖНО: стили оформления вынесены из @media print в обычные правила, потому что
     html2pdf.js (html2canvas) делает снимок блока в обычном режиме экрана, а не в
     режиме печати — внутри @media print эти стили были бы не видны html2canvas,
     и PDF получился бы пустым/неоформленным. @media print ниже отвечает только
     за запасной путь через системный диалог печати (window.print()). */
  .printable-report{ position:absolute; left:-99999px; top:0; width:800px; background:#fff; padding:24px; box-sizing:border-box; }
  .pr-brand{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#C99A3D;text-align:center;margin-bottom:10px;}
  .pr-header{text-align:center;border-bottom:3px solid #241609;padding-bottom:14px;margin-bottom:20px;}
  .pr-header h1{font-family:'Oswald',sans-serif;font-size:22px;text-transform:uppercase;margin:0 0 8px;color:#241609;}
  .pr-header .pr-client{font-family:'Inter',sans-serif;font-size:15px;color:#2B1B12;margin:0 0 4px;font-weight:600;}
  .pr-header p{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B5A48;margin:0;}
  .pr-block{margin-bottom:22px;}
  .pr-block h2{font-family:'Oswald',sans-serif;font-size:14px;text-transform:uppercase;border-bottom:1px solid #DCCFAE;padding-bottom:6px;margin-bottom:10px;color:#241609;}
  .pr-big{text-align:center;background:#FBF6EC;border:2px solid #C99A3D;border-radius:6px;padding:16px;margin-bottom:20px;}
  .pr-big .val{font-family:'Oswald',sans-serif;font-size:30px;color:#241609;font-weight:700;}
  .pr-big .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B5A48;text-transform:uppercase;}
  table.pr-table{width:100%;border-collapse:collapse;font-size:12px;font-family:'JetBrains Mono',monospace;}
  table.pr-table th{text-align:left;border-bottom:2px solid #241609;padding:6px 8px;font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:11px;}
  table.pr-table td{padding:6px 8px;border-bottom:1px solid #DCCFAE;}
  table.pr-table tr:nth-child(even){background:#FBF6EC;}
  .pr-footer{margin-top:30px;font-size:10px;color:#6B5A48;text-align:center;font-family:'JetBrains Mono',monospace;border-top:1px solid #DCCFAE;padding-top:12px;}
  .pr-footer b{color:#241609;}
  @media print{
    body *{visibility:hidden;}
    #printable-report, #printable-report *{visibility:visible;}
    #printable-report{display:block !important;position:absolute;left:0;top:0;width:100%;padding:20px;}
  }
</style>

<body>
<div class="app" id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
/* ================= STORAGE HELPERS (с откатом на localStorage) ================= */
function hasClaudeStorage(){ return typeof window.storage !== 'undefined' && window.storage && typeof window.storage.set === 'function'; }
async function storeSet(key, value, shared){
  if(hasClaudeStorage()){
    try{ const r = await window.storage.set(key, value, !!shared); if(r) return r; }catch(e){ console.warn('Хранилище Claude недоступно, использую localStorage'); }
  }
  if(shared) return null; // localStorage не может быть общим между устройствами — для shared просто нет замены
  try{ localStorage.setItem('calc-app:'+key, value); return {key,value,shared:false}; }catch(e){ console.warn(e); return null; }
}
async function storeGet(key, shared){
  if(hasClaudeStorage()){
    try{ const r = await window.storage.get(key, !!shared); if(r) return r; }catch(e){ console.warn('Хранилище Claude недоступно, использую localStorage'); }
  }
  if(shared) return null;
  try{ const v = localStorage.getItem('calc-app:'+key); return v!==null ? {key,value:v,shared:false} : null; }catch(e){ return null; }
}
async function storeDelete(key, shared){
  if(hasClaudeStorage()){
    try{ await window.storage.delete(key, !!shared); return true; }catch(e){ console.warn('Хранилище Claude недоступно при удалении, пробую localStorage'); }
  }
  if(shared) return false;
  try{ localStorage.removeItem('calc-app:'+key); return true; }catch(e){ console.warn(e); return false; }
}

/* ================= URL DATA ENCODING (сжатие + без хранилища — работает на любом хостинге) ================= */
function buildReportUrl(payload){
  const base = window.location.origin + window.location.pathname;
  const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(payload));
  return base + '?report=' + encodeURIComponent(compressed);
}
let lastReportParseError = null; // видимая причина сбоя разбора ?report=, вместо тихого console.error
function readReportFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const raw = params.get('report');
  if(!raw) return null;
  lastReportParseError = null;
  let decompressed;
  try{
    decompressed = LZString.decompressFromEncodedURIComponent(raw);
  }catch(e){
    lastReportParseError = 'LZString.decompressFromEncodedURIComponent выбросил исключение: ' + (e && e.message ? e.message : String(e));
    return null;
  }
  if(decompressed === null || decompressed === undefined || decompressed === ''){
    lastReportParseError = 'Декомпрессия вернула пустой результат — сжатая строка повреждена или обрезана при копировании/передаче.';
    return null;
  }
  try{
    return JSON.parse(decompressed);
  }catch(e){
    lastReportParseError = 'JSON.parse не смог разобрать результат декомпрессии: ' + (e && e.message ? e.message : String(e)) + '. Первые 80 символов результата: ' + decompressed.slice(0,80);
    return null;
  }
}

/* ================= LINK SHORTENING (чтобы длинная ссылка не обрывалась и не "слеплялась" в мессенджерах) =================
   Пробуем сократить через is.gd. Если сервис недоступен/не ответил за 5 секунд — молча
   откатываемся на длинную ссылку и сообщаем об этом в интерфейсе, а не ломаем отправку. */
async function shortenUrl(longUrl){
  try{
    const controller = new AbortController();
    const timeoutId = setTimeout(()=>controller.abort(), 5000);
    const resp = await fetch('https://is.gd/create.php?format=simple&url=' + encodeURIComponent(longUrl), { signal: controller.signal });
    clearTimeout(timeoutId);
    if(!resp.ok) throw new Error('is.gd ответил с ошибкой: ' + resp.status);
    const text = (await resp.text()).trim();
    if(text.indexOf('http') === 0) return text;
    throw new Error('is.gd вернул неожиданный ответ: ' + text);
  }catch(e){
    console.warn('Сокращение ссылки не удалось, используем длинную ссылку как есть:', e);
    return null;
  }
}

/* ================= NUMBER HELPERS ================= */
function toNum(v){
  if(v===null||v===undefined) return 0;
  const s = String(v).trim().replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

/* ================= STATE ================= */
const UNITS = ["г","кг","мл","л","шт"];
let lastReportData = null; // последний открытый отчёт (для имени PDF-файла)
let state = {
  view: "client",        // client | admin
  tab: "dishes",          // dishes | expenses | result | admin-lookup | admin-settings
  currency: "₾",
  settings: { whatsapp: "995579145634", reviewWhatsapp: "995591244075", telegram: "", pin: "2003", providerName: "Order Profit" },
  dishes: [],
  fixed: [
    ["Аренда помещения",0],["Оклады персонала",0],["Налоги на зарплату",0],["Коммунальные услуги",0],
    ["Интернет и связь",0],["Клининг / вывоз мусора",0],["Охрана / пожарная сигнализация",0],
    ["Бухгалтерия / юр. сопровождение",0],["Лицензии и разрешения",0],["Лизинг оборудования",0],
    ["ПО (касса, CRM, учёт)",0],["Маркетинг (фикс. бюджет)",0],["Страхование",0],["Ремонт и обслуживание",0],
    ["Прочие постоянные",0]
  ],
  variablePct: { acquiring: 2.5, delivery: 0, staffBonus: 0 },
  avgCheck: 0,
  lastSubmitId: null,
  clientName: "",
  clientCompany: "",
  clientPhone: "",
  manualSendUrl: null,
  lastReportLink: null,        // ссылка на отчёт, показанная как страховка на случай сбоя буфера обмена
  lastReportLinkCopied: false, // удалось ли реально скопировать в буфер (а не просто "должно было")
  savedList: [],           // [{id, name, updatedAt}]
  currentSavedId: null,
  currentSavedName: null
};

function newDish(name){
  return { id: crypto.randomUUID().slice(0,6), name: name||"Новое блюдо", sellPrice:0, packaging:0,
    ingredients: [ {name:"", unit:"г", pkgPrice:0, pkgQty:0, usedQty:0, modifier:false} ] };
}

function dishIngCost(ing){
  const p = toNum(ing.pkgPrice), pq = toNum(ing.pkgQty), uq = toNum(ing.usedQty);
  if(pq<=0) return 0;
  return (p/pq)*uq;
}
function dishBaseCost(d){
  return d.ingredients.filter(i=>!i.modifier).reduce((s,i)=>s+dishIngCost(i),0) + toNum(d.packaging);
}
function dishModifiersCost(d){
  return d.ingredients.filter(i=>i.modifier).reduce((s,i)=>s+dishIngCost(i),0);
}
function foodCostPct(d){
  const price = toNum(d.sellPrice);
  if(price<=0) return 0;
  return (dishBaseCost(d)/price)*100;
}

/* ================= CALC: BREAKEVEN ================= */
function computeBreakeven(){
  const totalFixed = state.fixed.reduce((s,[,v])=>s+toNum(v),0);
  const dishesWithPrice = state.dishes.filter(d=>toNum(d.sellPrice)>0);
  let avgFoodCostPct = 0;
  if(dishesWithPrice.length){
    avgFoodCostPct = dishesWithPrice.reduce((s,d)=>s+foodCostPct(d),0)/dishesWithPrice.length;
  }
  let avgCheck = toNum(state.avgCheck);
  if(avgCheck<=0 && dishesWithPrice.length){
    avgCheck = dishesWithPrice.reduce((s,d)=>s+toNum(d.sellPrice),0)/dishesWithPrice.length;
  }
  const varPct = toNum(state.variablePct.acquiring) + toNum(state.variablePct.delivery) + toNum(state.variablePct.staffBonus);
  const variableShare = (avgFoodCostPct/100) + (varPct/100);
  const marginShare = 1 - variableShare;
  let revenue = null, checksMonth = null, checksDay = null;
  if(marginShare > 0.001 && totalFixed>0){
    revenue = totalFixed / marginShare;
    if(avgCheck>0){ checksMonth = revenue/avgCheck; checksDay = checksMonth/30; }
  }
  return { totalFixed, avgFoodCostPct, avgCheck, varPct, marginShare, revenue, checksMonth, checksDay };
}

/* ================= RENDER ================= */
const app = document.getElementById("app");

function fmt(n, dec){
  if(n===null||n===undefined||isNaN(n)) return "—";
  const d = dec===undefined ? 2 : dec;
  const fixed = Number(n).toFixed(d);
  const parts = fixed.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  return parts.length>1 ? parts[0]+'.'+parts[1] : parts[0];
}

function render(){
  const activeEl = document.activeElement;
  const activeId = (activeEl && activeEl.id) ? activeEl.id : null;
  const selStart = (activeEl && 'selectionStart' in activeEl) ? activeEl.selectionStart : null;
  const selEnd = (activeEl && 'selectionEnd' in activeEl) ? activeEl.selectionEnd : null;

  const bk = computeBreakeven();
  app.innerHTML = `
    <header class="top">
      <div>
        <p class="brand-eyebrow">Общепит · Себестоимость · Точка безубыточности</p>
        <h1 class="brand">Калькулятор&nbsp;чек-баланс<small>Кофейни, рестораны и фастфуд — от блюда до точки безубыточности</small></h1>
      </div>
      <div class="mode-switch">
        <button data-act="setview" data-view="client" class="${state.view==='client'?'active':''}">Режим клиента</button>
        <button data-act="setview" data-view="admin" class="${state.view==='admin'?'active':''}">Админ</button>
      </div>
    </header>

      <div class="tab ${state.tab==='dishes'?'active':''}" data-act="tab" data-tab="dishes">1 · Блюда</div>

function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ================= EVENTS =================
   ВАЖНО: используем делегирование на уровне #app, а не навешивание обработчиков
   на каждый элемент при каждом render(). Раньше кнопки внутри renderReportInto()
   (Копировать отчёт, Скачать в PDF) вставлялись через innerHTML отдельно от
   основного render() и НИКОГДА не получали обработчик клика — отсюда "PDF не
   работает" (и "копировать" на самом деле тоже не работал, просто без видимой
   ошибки). Делегирование на #app решает это разом и для будущих вставок HTML. */
function bindGlobalEvents(){
  app.addEventListener('click', (e)=>{
    const el = e.target.closest('[data-act]');
    if(!el || !app.contains(el)) return;
    if(el.tagName==='INPUT' || el.tagName==='SELECT') return; // эти реагируют на 'input', не на 'click'
    if(el.tagName==='A' && el.getAttribute('href')==='#') e.preventDefault();
    handleAction(el.dataset.act, el, e);
  });
  app.addEventListener('input', (e)=>{
    const el = e.target.closest('[data-act]');
    if(!el || !app.contains(el)) return;
    if(el.tagName!=='INPUT' && el.tagName!=='SELECT') return;
    handleAction(el.dataset.act, el, e);
  });
}

function findDish(id){ return state.dishes.find(d=>d.id===id); }

function handleAction(act, el, e){
  switch(act){
    case 'setview':
      if(el.dataset.view==='admin' && state.view!=='admin'){
        const pin = prompt('Введите PIN администратора:');
        if(pin !== state.settings.pin){ alert('Неверный PIN'); return; }
      }
      state.view = el.dataset.view;
      if(state.view==='admin' && state.tab==='result') state.tab='dishes';
      render(); break;
    case 'tab': state.tab = el.dataset.tab; render(); break;

    case 'add-dish': state.dishes.push(newDish('')); render(); break;
    case 'dup-dish': {
      const orig = findDish(el.dataset.dish);
      const idx = state.dishes.findIndex(d=>d.id===el.dataset.dish);
      const copy = JSON.parse(JSON.stringify(orig));
      copy.id = crypto.randomUUID().slice(0,6);
      copy.name = orig.name + ' (копия)';
      state.dishes.splice(idx+1, 0, copy);
      render(); break;
    }
    case 'del-dish': state.dishes = state.dishes.filter(d=>d.id!==el.dataset.dish); render(); break;
    case 'dish-name': findDish(el.dataset.dish).name = el.value; render(); break;
    case 'dish-price': findDish(el.dataset.dish).sellPrice = el.value; render(); break;
    case 'dish-packaging': findDish(el.dataset.dish).packaging = el.value; render(); break;

    case 'add-ing': findDish(el.dataset.dish).ingredients.push({name:"",unit:"г",pkgPrice:0,pkgQty:0,usedQty:0,modifier:false}); render(); break;
    case 'add-mod': findDish(el.dataset.dish).ingredients.push({name:"",unit:"г",pkgPrice:0,pkgQty:0,usedQty:0,modifier:true}); render(); break;
    case 'del-ing': {
      const row = el.closest('.ing-row');
      const d = findDish(row.dataset.dish);
      d.ingredients.splice(parseInt(row.dataset.idx),1);
      render(); break;
    }
    case 'ing-name': case 'ing-pkgprice': case 'ing-pkgqty': case 'ing-unit': case 'ing-usedqty': {
      const row = el.closest('.ing-row');
      const d = findDish(row.dataset.dish);
      const ing = d.ingredients[parseInt(row.dataset.idx)];
      if(act==='ing-name') ing.name = el.value;
      if(act==='ing-pkgprice') ing.pkgPrice = el.value;
      if(act==='ing-pkgqty') ing.pkgQty = el.value;
      if(act==='ing-unit') ing.unit = el.value;
      if(act==='ing-usedqty') ing.usedQty = el.value;
      render(); break;
    }

    case 'fixed-val': state.fixed[parseInt(el.dataset.idx)][1] = el.value; render(); break;
    case 'add-fixed': {
      const name = prompt('Название статьи расхода:');
      if(name){ state.fixed.push([name,0]); render(); }
      break;
    }
    case 'var-acquiring': state.variablePct.acquiring = el.value; render(); break;
    case 'var-delivery': state.variablePct.delivery = el.value; render(); break;
    case 'var-staffbonus': state.variablePct.staffBonus = el.value; render(); break;
    case 'avg-check': state.avgCheck = el.value; render(); break;

    case 'save-new': {
      const nameEl = document.getElementById('new-save-name');
      const name = nameEl ? nameEl.value : '';
      if(!name || !name.trim()){ alert('Впишите название формы.'); return; }
      saveAsNew(name).then(()=>storeSet('last-active-id', state.currentSavedId, false));
      break;
    }
    case 'update-current': updateCurrentSave(); break;
    case 'open-saved': openSaved(el.dataset.id).then(()=>storeSet('last-active-id', el.dataset.id, false)); break;
    case 'dup-saved': duplicateSaved(el.dataset.id); break;
    case 'del-saved': deleteSaved(el.dataset.id); break;

    case 'send': sendResult(el.dataset.channel); break;
    case 'admin-send-report': adminSendReport(); break;

    case 'do-lookup': doLookup(); break;
    case 'print-report': downloadReportPdf(el); break;
    case 'copy-report': {
      const ta = document.getElementById('report-text');
      if(!ta) break;
      ta.focus(); ta.select();
      let copied = false;
      try{
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(ta.value);
          copied = true;
        }
      }catch(e){}
      if(!copied){
        try{ document.execCommand('copy'); copied = true; }catch(e){}
      }
      el.textContent = copied ? 'Скопировано ✓' : 'Не удалось — выделите текст вручную';
      setTimeout(()=>{ el.textContent = 'Копировать отчёт'; }, 2000);
      break;
    }

    case 'save-settings': {
      state.settings.whatsapp = document.getElementById('set-wa').value.trim();
      state.settings.reviewWhatsapp = document.getElementById('set-wa-review').value.trim();
      state.settings.telegram = document.getElementById('set-tg').value.trim();
      state.currency = document.getElementById('set-cur').value.trim() || '₾';
      state.settings.pin = document.getElementById('set-pin').value.trim() || '1234';
      state.settings.providerName = document.getElementById('set-provider').value.trim() || 'Order Profit';
      storeSet('settings', JSON.stringify(state.settings), false);
      alert('Настройки сохранены на этом устройстве.');
      render(); break;
    }
  }
}

/* ================= SAVED CALCULATIONS LIBRARY ================= */
function snapshotCurrent(){
  return { dishes: state.dishes, fixed: state.fixed, variablePct: state.variablePct, avgCheck: state.avgCheck, currency: state.currency };
}
async function refreshSavedList(){
  const res = await storeGet('saved-list', false);
  state.savedList = (res && res.value) ? JSON.parse(res.value) : [];
}
async function persistSavedList(){
  await storeSet('saved-list', JSON.stringify(state.savedList), false);
}
async function saveAsNew(name){
  if(!name || !name.trim()) return;
  const id = crypto.randomUUID().slice(0,8);
  await storeSet('saved-item:'+id, JSON.stringify(snapshotCurrent()), false);
  state.savedList.unshift({ id, name: name.trim(), updatedAt: new Date().toISOString() });
  await persistSavedList();
  state.currentSavedId = id; state.currentSavedName = name.trim();
  render();
}
async function updateCurrentSave(){
  if(!state.currentSavedId) return;
  await storeSet('saved-item:'+state.currentSavedId, JSON.stringify(snapshotCurrent()), false);
  const item = state.savedList.find(s=>s.id===state.currentSavedId);
  if(item) item.updatedAt = new Date().toISOString();
  await persistSavedList();
  render();
}
async function openSaved(id){
  const res = await storeGet('saved-item:'+id, false);
  if(!res) return;
  const data = JSON.parse(res.value);
  state.dishes = data.dishes; state.fixed = data.fixed; state.variablePct = data.variablePct;
  state.avgCheck = data.avgCheck; state.currency = data.currency || state.currency;
  const item = state.savedList.find(s=>s.id===id);
  state.currentSavedId = id; state.currentSavedName = item ? item.name : null;
  state.tab = 'dishes';
  render();
}
async function duplicateSaved(id){
  const res = await storeGet('saved-item:'+id, false);
  if(!res) return;
  const item = state.savedList.find(s=>s.id===id);
  const newId = crypto.randomUUID().slice(0,8);
  await storeSet('saved-item:'+newId, res.value, false);
  state.savedList.unshift({ id: newId, name: (item?item.name:'Расчёт')+' (копия)', updatedAt: new Date().toISOString() });
  await persistSavedList();
  render();
}
async function deleteSaved(id){
  if(!confirm('Удалить этот сохранённый расчёт без возможности восстановить?')) return;
  // ИСПРАВЛЕНО: раньше здесь был прямой вызов window.storage.delete(...) без проверки на
  // существование этого API. На GitHub Pages (и любом обычном хостинге) window.storage
  // не существует — вызов падал с TypeError, и кнопка "Удалить" не работала на проде.
  await storeDelete('saved-item:'+id, false);
  state.savedList = state.savedList.filter(s=>s.id!==id);
  if(state.currentSavedId===id){ state.currentSavedId=null; state.currentSavedName=null; }
  await persistSavedList();
  render();
}

async function adminSendReport(){
  const bk = computeBreakeven();
  if(bk.revenue===null){ alert('Недостаточно данных для расчёта.'); return; }
  const win = window.open('about:blank', '_blank');
  const payload = { id: state.currentSavedId || crypto.randomUUID().slice(0,6), date: new Date().toISOString(), currency: state.currency, dishes: state.dishes, fixed: state.fixed, variablePct: state.variablePct, avgCheck: state.avgCheck, breakeven: bk };
  const report = buildReportText(payload);
  const url = `https://wa.me/${state.settings.reviewWhatsapp.replace(/[^0-9]/g,'')}?text=${encodeURIComponent(report)}`;
  if(win && !win.closed){
    win.location.href = url;
  } else {
    alert('Браузер заблокировал автооткрытие. Нажмите ОК и используйте ссылку ниже.');
    state.manualSendUrl = url;
    render();
  }
}

/* ================= SUBMIT TO ADMIN ================= */
async function sendResult(channel){
  if(sendResult._busy) return; // простая защита от дребезга повторного клика
  sendResult._busy = true;
  try{
    await sendResultImpl(channel);
  } finally {
    sendResult._busy = false;
  }
}
async function sendResultImpl(channel){
  const bk = computeBreakeven();
  if(bk.revenue===null){ alert('Сначала заполните хотя бы блюда с ценами и постоянные расходы.'); return; }

  // Валидация ОБЯЗАТЕЛЬНЫХ полей клиента — делаем это до открытия окна, чтобы при ошибке
  // не оставалась висеть пустая вкладка about:blank.
  const nameEl = document.getElementById('client-name');
  const companyEl = document.getElementById('client-company');
  const phoneEl = document.getElementById('client-phone');
  const name = nameEl ? nameEl.value.trim() : '';
  const company = companyEl ? companyEl.value.trim() : '';
  const phone = phoneEl ? phoneEl.value.trim() : '';
  if(!name){ alert('Впишите ваше имя — это обязательное поле.'); if(nameEl) nameEl.focus(); return; }
  if(!company){ alert('Впишите название компании / точки — это обязательное поле.'); if(companyEl) companyEl.focus(); return; }
  if(!phone){ alert('Впишите телефон для связи — это обязательное поле.'); if(phoneEl) phoneEl.focus(); return; }
  state.clientName = name; state.clientCompany = company; state.clientPhone = phone;

  // Открываем окно СРАЗУ, синхронно, пока браузер ещё считает это прямым результатом клика.
  const win = window.open('about:blank', '_blank');

  const id = crypto.randomUUID().slice(0,6);
  const payload = { id, date: new Date().toISOString(), currency: state.currency, dishes: state.dishes, fixed: state.fixed, variablePct: state.variablePct, avgCheck: state.avgCheck, breakeven: bk, clientName: state.clientName, clientCompany: state.clientCompany, clientPhone: state.clientPhone };
  state.lastSubmitId = id;
  const reportUrl = buildReportUrl(payload);

  /* ВАЖНО: раньше длинная ссылка вставлялась прямо в текст WhatsApp-сообщения. Итоговая
     ссылка wa.me получалась ~1900 символов (кириллица после encodeURIComponent разрастается
     в 6 раз на символ) — это впритык к общепринятому пределу ~2000 символов, после которого
     браузер/ОС может ОБРЕЗАТЬ ссылку молча, без единой ошибки. Именно это и произошло —
     воспроизведено и посчитано в этом же чате. Теперь вместо вставки в текст — копируем
     ссылку в буфер обмена, а в WhatsApp уходит короткое сообщение с просьбой её вставить.
     Копирование делаем СРАЗУ, синхронно после клика, без await перед этим — на iOS Safari
     доступ к буферу обмена может быть отклонён, если прошло слишком много времени с момента
     прямого действия пользователя (тот же принцип, что и с window.open). */
  let copied = false;
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(reportUrl);
      copied = true;
    }
  }catch(e){ console.warn('Clipboard API отклонил запись:', e); }
  if(!copied){
    try{
      const ta = document.createElement('textarea');
      ta.value = reportUrl;
      ta.style.position = 'fixed'; ta.style.left = '-9999px'; ta.style.top = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      copied = document.execCommand('copy');
      document.body.removeChild(ta);
    }catch(e){ console.warn('Запасной способ копирования тоже не сработал:', e); }
  }

  // Страховка от невидимого сбоя: ссылку показываем на экране в любом случае, скопировалась
  // она или нет — не верим молча, что буфер сработал, а даём проверить глазами.
  state.lastReportLink = reportUrl;
  state.lastReportLinkCopied = copied;

  const text = copied
    ? `Расчёт себестоимости и точки безубыточности\n`+
      `Компания: ${company}\n`+
      `Клиент: ${name}, тел. ${phone}\n`+
      `ID: ${id}\n`+
      `Ссылка на отчёт скопирована в буфер обмена — нажмите и удерживайте поле ввода в этом чате и выберите «Вставить» перед отправкой.`
    : `Расчёт себестоимости и точки безубыточности\n`+
      `Компания: ${company}\n`+
      `Клиент: ${name}, тел. ${phone}\n`+
      `ID: ${id}\n`+
      `Не удалось скопировать ссылку автоматически — вернитесь в инструмент и скопируйте её вручную из поля на экране, затем вставьте сюда.`;

  const url = channel==='whatsapp'
    ? `https://wa.me/${state.settings.whatsapp}?text=${encodeURIComponent(text)}`
    : `https://t.me/${state.settings.telegram}?text=${encodeURIComponent(text)}`;

  if(win && !win.closed){
    win.location.href = url;
  } else {
    alert('Браузер заблокировал автооткрытие. Нажмите ОК и используйте ссылку, которая появится ниже.');
    state.manualSendUrl = url;
  }
  render();
}

function buildReportText(data){
  const bk = data.breakeven;
  let lines = [];
  lines.push('ОТЧЁТ: СЕБЕСТОИМОСТЬ И ТОЧКА БЕЗУБЫТОЧНОСТИ');
  lines.push('Компания: ' + (data.clientCompany || '—'));
  lines.push('Клиент: ' + (data.clientName || '—') + (data.clientPhone ? ', тел. ' + data.clientPhone : ''));
  lines.push('ID расчёта: ' + data.id);
  lines.push('');
  lines.push('— ТОЧКА БЕЗУБЫТОЧНОСТИ —');
  lines.push('Выручка/мес: ' + fmt(bk.revenue,0) + ' ' + data.currency);
  lines.push('Чеков/мес: ' + fmt(bk.checksMonth,0) + '  ·  Чеков/день: ' + fmt(bk.checksDay,1));
  lines.push('Постоянные расходы/мес: ' + fmt(bk.totalFixed,0) + ' ' + data.currency);
  lines.push('Средний чек: ' + fmt(bk.avgCheck,1) + ' ' + data.currency);
  lines.push('');
  lines.push('— СЕБЕСТОИМОСТЬ ПО МЕНЮ —');
  data.dishes.forEach(d=>{
    const base = d.ingredients.filter(i=>!i.modifier).reduce((s,i)=>s+dishIngCost(i),0)+toNum(d.packaging);
    const fc = toNum(d.sellPrice)>0 ? (base/toNum(d.sellPrice)*100) : 0;
    const margin = toNum(d.sellPrice) - base;
    lines.push(d.name + ':');
    lines.push('  себестоимость ' + fmt(base) + ' ' + data.currency + ' · цена ' + fmt(d.sellPrice) + ' ' + data.currency + ' · food cost ' + (fc?fmt(fc,1)+'%':'—') + ' · маржа ' + fmt(margin) + ' ' + data.currency);
  });
  lines.push('');
  lines.push('— ПОСТОЯННЫЕ РАСХОДЫ —');
  data.fixed.filter(f=>toNum(f[1])>0).forEach(f=>{
    lines.push('  ' + f[0] + ': ' + fmt(f[1],0) + ' ' + data.currency);
  });
  return lines.join('\n');
}

async function doLookup(){
  const raw = document.getElementById('lookup-url').value.trim();
  const out = document.getElementById('lookup-out');
  if(!raw){ return; }
  let data = extractReportFromInput(raw);
  if(!data){ out.innerHTML = '<p class="empty-note">Не удалось прочитать отчёт — проверьте, что ссылка скопирована целиком.</p>'; return; }
  renderReportInto(out, data);
}
function extractReportFromInput(raw){
  try{
    if(raw.includes('report=')){
      const qIndex = raw.indexOf('?');
      const params = new URLSearchParams(qIndex>=0 ? raw.slice(qIndex) : raw);
      const p = params.get('report');
      if(p) return JSON.parse(LZString.decompressFromEncodedURIComponent(p));
    }
    // иначе пробуем как голый сжатый код
    return JSON.parse(LZString.decompressFromEncodedURIComponent(raw));
  }catch(e){ console.error(e); return null; }
}

/* Скачивание настоящего PDF-файла (без системного диалога печати) через html2pdf.js.
   Если библиотека не загрузилась (например, CDN недоступен) — откатываемся на
   window.print(), как было раньше, а не оставляем кнопку нерабочей молча. */
async function downloadReportPdf(triggerEl){
  const el = document.getElementById('printable-report');
  if(!el){ window.print(); return; }
  const originalLabel = triggerEl ? triggerEl.textContent : '';
  if(triggerEl){ triggerEl.textContent = 'Готовим PDF…'; triggerEl.disabled = true; }
  try{
    if(typeof html2pdf === 'undefined') throw new Error('html2pdf.js не загрузился (проверьте сеть/CDN)');
    const idPart = (lastReportData && lastReportData.id) ? lastReportData.id : 'raschet';
    await html2pdf().from(el).set({
      margin: 8,
      filename: 'otchet-' + idPart + '.pdf',
      image: { type: 'jpeg', quality: 0.95 },
      html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).save();
  }catch(e){
    console.warn('html2pdf.js не сработал, откатываемся на системную печать:', e);
    alert('Не удалось сформировать PDF-файл напрямую — открываю системный диалог печати. В нём выберите «Сохранить как PDF».');
    window.print();
  }finally{
    if(triggerEl){ triggerEl.textContent = originalLabel; triggerEl.disabled = false; }
  }
}

  out.innerHTML = `

      <div class="row r2">
        <div><span class="tiny">Точка безубыточности</span><br><b>${fmt(data.breakeven.revenue,0)} ${data.currency}</b></div>
        <div><span class="tiny">Чеков/день</span><br><b>${fmt(data.breakeven.checksDay,1)}</b></div>
      </div>
      <h3 style="font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:13px;margin-top:16px;">Блюда</h3>
      ${data.dishes.map(d=>{
        const base = d.ingredients.filter(i=>!i.modifier).reduce((s,i)=>s+dishIngCost(i),0)+toNum(d.packaging);

        return `<div class="exp-row"><span>${escapeHtml(d.name)} — себест. ${fmt(base)} ${data.currency}, цена ${fmt(d.sellPrice)} ${data.currency}</span><span>${fc?fmt(fc,1)+'%':'—'}</span></div>`;
      }).join('')}
      <h3 style="font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:13px;margin-top:16px;">Постоянные расходы</h3>
      ${data.fixed.filter(f=>toNum(f[1])>0).map(f=>`<div class="exp-row"><span>${escapeHtml(f[0])}</span><span>${fmt(f[1],0)} ${data.currency}</span></div>`).join('') || '<p class="empty-note">Не заполнены</p>'}

      <h3 style="font-family:'Oswald',sans-serif;text-transform:uppercase;font-size:13px;margin-top:20px;border-top:1px solid var(--line);padding-top:14px;">Отчёт для отправки клиенту</h3>
      <textarea id="report-text" readonly style="width:100%;min-height:220px;font-family:'JetBrains Mono',monospace;font-size:12px;padding:12px;border:1px solid var(--line);border-radius:2px;">${escapeHtml(report)}</textarea>
      <div class="send-box" style="justify-content:flex-start;margin-top:10px;">
        <button class="btn btn-primary btn-sm" data-act="copy-report">Копировать отчёт</button>
        <a class="btn btn-gold btn-sm" href="https://wa.me/${state.settings.reviewWhatsapp.replace(/[^0-9]/g,'')}?text=${encodeURIComponent(report)}" target="_blank">Отправить на внутренний WhatsApp</a>
        <button class="btn btn-gold btn-sm" data-act="print-report">Скачать в PDF</button>
      </div>
      <p class="tiny" style="margin-top:10px;">Клиенту отправляйте вручную — скопируйте отчёт и вставьте в чат, откуда пришли его данные, только после оплаты.</p>
    </div>
    <div class="printable-report" id="printable-report">${buildPrintableReportHtml(data)}</div>
  `;
}

/* ================= INIT ================= */
async function init(){
  try{
    const s = await storeGet('settings', false);
    if(s && s.value){ state.settings = {...state.settings, ...JSON.parse(s.value)}; }
  }catch(e){}

  // Если открыли по ссылке с отчётом — сразу показываем его (после PIN), минуя обычную форму
  const hasReportParam = new URLSearchParams(window.location.search).has('report');
  const reportData = readReportFromUrl();
  if(reportData){
    const pin = prompt('Эта ссылка открывает детальный отчёт. Введите PIN администратора:');
    if(pin === state.settings.pin){
      app.innerHTML = `
        <header class="top"><div><p class="brand-eyebrow">Отчёт по ссылке</p><h1 class="brand">Детальный отчёт<small>ID расчёта: ${escapeHtml(reportData.id||'')}</small></h1></div></header>
        <div class="layout"><div class="panel" id="direct-report"></div><div></div></div>
      `;
      renderReportInto(document.getElementById('direct-report'), reportData);
    } else {
      app.innerHTML = `<div class="panel" style="margin-top:40px;"><h2>Неверный PIN</h2><p class="sub">Обновите страницу и попробуйте снова, либо откройте инструмент по обычной ссылке без ?report=...</p></div>`;
    }
    return; // не запускаем обычную форму поверх отчёта
  } else if(hasReportParam){
    // ВАЖНО: параметр report в ссылке ЕСТЬ, но разобрать его не удалось — раньше это тихо
    // проваливалось в обычную стартовую форму, и понять причину можно было только гаданием
    // по скриншотам. Теперь показываем точную причину сбоя прямо на экране.
    app.innerHTML = `
      <div class="panel" style="margin-top:40px;max-width:640px;margin-left:auto;margin-right:auto;">
        <h2>Не удалось прочитать отчёт по ссылке</h2>
        <p class="sub">В ссылке есть параметр отчёта, но расшифровать его не получилось. Это не тот же экран, что при отсутствии ссылки вообще — ниже точная техническая причина.</p>
        <div class="warn-box">${escapeHtml(lastReportParseError || 'Причина не определена.')}</div>
        <p class="tiny">Вероятные причины: ссылка была обрезана при копировании из мессенджера, повреждена при передаче, либо была создана другой версией инструмента. Скопируйте ссылку заново целиком (от https до самого конца строки) и откройте в новой вкладке.</p>
      </div>`;
    return;
  }

  await refreshSavedList();

  let restored = false;
  try{
    const last = await storeGet('last-active-id', false);
    if(last && last.value && state.savedList.find(s=>s.id===last.value)){
      await openSaved(last.value);
      restored = true;
    }
  }catch(e){}

  if(!restored && state.dishes.length===0){
    const d = newDish('Латте');
    d.sellPrice = 9;
    d.packaging = 0.6;
    d.ingredients = [
      {name:'Кофе в зёрнах', unit:'г', pkgPrice:38, pkgQty:1000, usedQty:18, modifier:false},
      {name:'Молоко', unit:'мл', pkgPrice:3.2, pkgQty:1000, usedQty:200, modifier:false},
      {name:'Сироп (по запросу)', unit:'мл', pkgPrice:14, pkgQty:700, usedQty:10, modifier:true}
    ];
    state.dishes.push(d);
  }
  render();
}
bindGlobalEvents();
init();
</script>
</body>
</html>
